<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="100%" height="100%" viewBox="0 0 640 360" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <marker id="loop-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="white" />
    </marker>
  </defs>

  <!-- Input -->
  <rect x="260" y="20" width="120" height="70" rx="10" fill="none" stroke="white" stroke-width="3" />
  <text x="320" y="63" text-anchor="middle" fill="white" font-size="22" font-family="sans-serif">Input</text>

  <!-- Update -->
  <rect x="440" y="250" width="120" height="70" rx="10" fill="none" stroke="rgb(27,212,215)" stroke-width="4" />
  <text x="500" y="293" text-anchor="middle" fill="rgb(27,212,215)" font-size="22" font-family="sans-serif">Update</text>

  <!-- Render -->
  <rect x="80" y="250" width="120" height="70" rx="10" fill="none" stroke="white" stroke-width="3" />
  <text x="140" y="293" text-anchor="middle" fill="white" font-size="22" font-family="sans-serif">Render</text>

  <!-- Input -> Update -->
  <line x1="368" y1="88" x2="452" y2="248" stroke="white" stroke-width="3" marker-end="url(#loop-arrow)" />

  <!-- Update -> Render -->
  <line x1="438" y1="285" x2="202" y2="285" stroke="white" stroke-width="3" marker-end="url(#loop-arrow)" />

  <!-- Render -> Input -->
  <line x1="188" y1="248" x2="272" y2="88" stroke="white" stroke-width="3" marker-end="url(#loop-arrow)" />

  <text x="320" y="200" text-anchor="middle" fill="white" font-size="18" font-family="sans-serif" font-style="italic">Repeats every frame</text>
</svg>
