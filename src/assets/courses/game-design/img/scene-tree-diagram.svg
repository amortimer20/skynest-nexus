<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="100%" height="100%" viewBox="0 0 680 340" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Tree connectors -->
  <line x1="340" y1="70" x2="145" y2="150" stroke="white" stroke-width="2.5" />
  <line x1="340" y1="70" x2="505" y2="150" stroke="white" stroke-width="2.5" />
  <line x1="505" y1="200" x2="395" y2="250" stroke="white" stroke-width="2.5" />
  <line x1="505" y1="200" x2="505" y2="250" stroke="white" stroke-width="2.5" />
  <line x1="505" y1="200" x2="615" y2="250" stroke="white" stroke-width="2.5" />

  <!-- Game (root) -->
  <rect x="290" y="20" width="100" height="50" rx="8" fill="none" stroke="white" stroke-width="3" />
  <text x="340" y="51" text-anchor="middle" fill="white" font-size="18" font-family="sans-serif">Game</text>

  <!-- Player -->
  <rect x="90" y="150" width="110" height="50" rx="8" fill="none" stroke="white" stroke-width="3" />
  <text x="145" y="181" text-anchor="middle" fill="white" font-size="18" font-family="sans-serif">Player</text>

  <!-- Asteroids (grouping parent) -->
  <rect x="440" y="150" width="130" height="50" rx="8" fill="none" stroke="rgb(27,212,215)" stroke-width="4" />
  <text x="505" y="181" text-anchor="middle" fill="rgb(27,212,215)" font-size="18" font-family="sans-serif">Asteroids</text>

  <!-- Asteroid children -->
  <rect x="350" y="250" width="90" height="50" rx="8" fill="none" stroke="white" stroke-width="3" />
  <text x="395" y="281" text-anchor="middle" fill="white" font-size="16" font-family="sans-serif">Asteroid</text>

  <rect x="460" y="250" width="90" height="50" rx="8" fill="none" stroke="white" stroke-width="3" />
  <text x="505" y="281" text-anchor="middle" fill="white" font-size="16" font-family="sans-serif">Asteroid2</text>

  <rect x="570" y="250" width="90" height="50" rx="8" fill="none" stroke="white" stroke-width="3" />
  <text x="615" y="281" text-anchor="middle" fill="white" font-size="16" font-family="sans-serif">Asteroid3</text>
</svg>
