<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="100%" height="100%" viewBox="0 0 520 380" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <marker id="axis-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="white" />
    </marker>
  </defs>

  <text x="260" y="30" text-anchor="middle" fill="white" font-size="20" font-family="sans-serif">Godot's 2D Coordinate System</text>

  <!-- Axes -->
  <line x1="80" y1="60" x2="460" y2="60" stroke="white" stroke-width="3" marker-end="url(#axis-arrow)" />
  <line x1="80" y1="60" x2="80" y2="340" stroke="white" stroke-width="3" marker-end="url(#axis-arrow)" />
  <text x="445" y="52" text-anchor="middle" fill="white" font-size="18" font-family="monospace">+X</text>
  <text x="105" y="330" text-anchor="middle" fill="white" font-size="18" font-family="monospace">+Y</text>

  <!-- Origin -->
  <circle cx="80" cy="60" r="5" fill="white" />
  <text x="55" y="48" text-anchor="end" fill="white" font-size="16" font-family="monospace">(0, 0)</text>

  <!-- Sample point -->
  <line x1="80" y1="220" x2="320" y2="220" stroke="white" stroke-width="1.5" stroke-dasharray="6,5" />
  <line x1="320" y1="60" x2="320" y2="220" stroke="white" stroke-width="1.5" stroke-dasharray="6,5" />
  <circle cx="320" cy="220" r="7" fill="rgb(27,212,215)" />
  <text x="335" y="215" fill="rgb(27,212,215)" font-size="16" font-family="monospace">(240, 160)</text>

  <text x="260" y="368" text-anchor="middle" fill="white" font-size="15" font-family="sans-serif" font-style="italic">(0, 0) is the top-left corner &mdash; Y increases downward</text>
</svg>
