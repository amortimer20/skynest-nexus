<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="100%" height="100%" viewBox="0 0 640 340" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <marker id="io-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="white" />
    </marker>
  </defs>

  <!-- Input -->
  <rect x="20" y="120" width="140" height="80" rx="10" fill="none" stroke="white" stroke-width="3" />
  <text x="90" y="167" text-anchor="middle" fill="white" font-size="24" font-family="sans-serif">Input</text>

  <!-- Input -> Processing -->
  <line x1="160" y1="160" x2="234" y2="160" stroke="white" stroke-width="3" marker-end="url(#io-arrow)" />

  <!-- Processing -->
  <rect x="240" y="105" width="160" height="110" rx="10" fill="none" stroke="rgb(27,212,215)" stroke-width="4" />
  <text x="320" y="152" text-anchor="middle" fill="rgb(27,212,215)" font-size="24" font-family="sans-serif">Processing</text>
  <text x="320" y="182" text-anchor="middle" fill="rgb(27,212,215)" font-size="17" font-family="sans-serif">(CPU)</text>

  <!-- Processing -> Output -->
  <line x1="400" y1="160" x2="474" y2="160" stroke="white" stroke-width="3" marker-end="url(#io-arrow)" />

  <!-- Output -->
  <rect x="480" y="120" width="140" height="80" rx="10" fill="none" stroke="white" stroke-width="3" />
  <text x="550" y="167" text-anchor="middle" fill="white" font-size="24" font-family="sans-serif">Output</text>

  <!-- Memory -->
  <rect x="245" y="262" width="150" height="70" rx="10" fill="none" stroke="white" stroke-width="3" />
  <text x="320" y="304" text-anchor="middle" fill="white" font-size="24" font-family="sans-serif">Memory</text>

  <!-- Processing <-> Memory -->
  <line x1="320" y1="215" x2="320" y2="260" stroke="white" stroke-width="3" marker-end="url(#io-arrow)" marker-start="url(#io-arrow)" />
</svg>
